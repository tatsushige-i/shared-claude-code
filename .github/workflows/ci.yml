name: CI

on:
  workflow_dispatch:

env:
  # プロジェクトで使用するNode.jsバージョン。EOLに達したら更新する。
  NODE_VERSION: 20

jobs:
  eol-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Check Node.js EOL
        run: |
          eol=$(curl -sf https://endoflife.date/api/nodejs/$NODE_VERSION.json | jq -r '.eol')
          today=$(date +%Y-%m-%d)
          echo "Node.js $NODE_VERSION EOL: $eol / Today: $today"
          if [[ "$today" > "$eol" ]]; then
            echo "::error::Node.js $NODE_VERSION has reached EOL ($eol)"
            exit 1
          fi

      - name: Check npm audit
        # セキュリティ要件に応じて --audit-level を調整（low / moderate / high / critical）
        run: npm audit --omit=dev --audit-level=moderate

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - run: npm run lint

  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - run: npm run test

  build:
    needs: [lint, test]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - run: npm run build
