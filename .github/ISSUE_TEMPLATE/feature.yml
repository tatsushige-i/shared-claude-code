name: Feature Request
description: 新しい機能の提案
labels: ["feature"]
body:
  - type: textarea
    id: description
    attributes:
      label: 概要
      description: 提案する機能の内容を説明してください
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: 動機
      description: なぜこの機能が必要か記載してください
    validations:
      required: false
  - type: textarea
    id: solution
    attributes:
      label: 実現方法の案
      description: 実装のアイデアがあれば記載してください
    validations:
      required: false
