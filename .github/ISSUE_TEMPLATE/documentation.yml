name: Documentation
description: ドキュメントの追加・修正
labels: ["documentation"]
body:
  - type: textarea
    id: description
    attributes:
      label: 内容
      description: 追加・修正したいドキュメントの内容を説明してください
    validations:
      required: true
  - type: textarea
    id: reason
    attributes:
      label: 理由
      description: なぜこの変更が必要か記載してください
    validations:
      required: false
